<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NFT preview card component">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/variables.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Public+Sans:wght@400;800&family=Red+Hat+Display:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="./src/images/favicon-32x32.png" type="image/x-icon">
    <title>Frontend Mentor | NFT preview card component</title>
</head>

<body>
    <main>
        <div class="nft-card">
            <a href="#">
                <img src="./src/images/image-equilibrium.jpg" alt="equilibrium nft image">
            </a>
            <a href="#">
                <h2>Equilibrium #3429</h2>
            </a>
            <p>Our Equilibrium collection promotes balance and calm.</p>
            <div>
                <p> 0.041 ETH</p>
                <p>3 days left</p>
            </div>
            <div>
                <img src="./src/images/image-avatar.png" alt="image avatar">
                <p>Creation of <a href="#">Jules Wyvern</a></p>
            </div>
        </div>
    </main>
</body>

</html>
